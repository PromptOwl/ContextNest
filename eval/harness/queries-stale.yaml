# Stale-Version Attack Query Suite
# Each query probes a fact where the current published version contradicts the older
# archived version in .versions/. gold_facts contains the CURRENT (correct) answer.
# A retrieval that surfaces the stale version may emit the OLD (wrong) answer.

# ============================================================
# Deploy Rollback (5 queries) — runbooks/deploy-rollback
# ============================================================
- id: s01
  question: "What error rate threshold triggers a production deploy rollback?"
  selector: "#runbook #deploy"
  gold_doc: nodes/runbooks/deploy-rollback
  gold_facts:
    - "1%"
    - "exceeds 1%"

- id: s02
  question: "What P99 latency threshold triggers a production deploy rollback?"
  selector: "#runbook #deploy"
  gold_doc: nodes/runbooks/deploy-rollback
  gold_facts:
    - "800ms"
    - "exceeds 800ms"

- id: s03
  question: "Which Datadog monitor triggers a production deploy rollback?"
  selector: "#runbook #deploy"
  gold_doc: nodes/runbooks/deploy-rollback
  gold_facts:
    - "prod-deploy-health"

- id: s04
  question: "Which team owns the production deploy rollback runbook?"
  selector: "#runbook #deploy"
  gold_doc: nodes/runbooks/deploy-rollback
  gold_facts:
    - "platform team"

- id: s05
  question: "What is the mean rollback time for a production deploy?"
  selector: "#runbook #deploy"
  gold_doc: nodes/runbooks/deploy-rollback
  gold_facts:
    - "4 minutes"

